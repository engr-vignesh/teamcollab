@if (isOpen) {
<!-- Backdrop -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <!-- Overlay -->
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" (click)="onClose()"></div>

    <!-- Dialog -->
    <div class="relative z-10 w-full max-w-lg bg-base-100 rounded-3xl border border-base-200 shadow-2xl overflow-hidden"
        style="animation: dialogIn 0.25s ease-out;">

        <!-- Header -->
        <div class="flex items-center justify-between px-6 pt-6 pb-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center"
                    [ngClass]="isEditMode ? 'bg-warning/10 text-warning' : 'bg-primary/10 text-primary'">
                    <i-lucide [name]="isEditMode ? 'pencil' : 'plus'" class="w-5 h-5"></i-lucide>
                </div>
                <h2 class="text-xl font-bold tracking-tight">{{ dialogTitle }}</h2>
            </div>
            <button (click)="onClose()"
                class="btn btn-ghost btn-sm btn-circle text-base-content/50 hover:text-base-content">
                <i-lucide name="x" class="w-5 h-5"></i-lucide>
            </button>
        </div>

        <!-- Divider -->
        <div class="h-px bg-base-200 mx-6"></div>

        <!-- Form Body -->
        <div class="px-6 py-5 flex flex-col gap-5">
            <!-- Task Name -->
            <div class="form-control">
                <label class="label pb-1">
                    <span class="label-text font-semibold text-sm">Task Name <span
                            class="text-error">*</span></span>
                </label>
                <input type="text" [(ngModel)]="title" placeholder="Enter task name..."
                    class="input input-bordered w-full rounded-xl focus:input-primary transition-colors"
                    id="task-name-input" />
            </div>

            <!-- Description -->
            <div class="form-control">
                <label class="label pb-1">
                    <span class="label-text font-semibold text-sm">Description</span>
                </label>
                <textarea [(ngModel)]="description" placeholder="Describe the task..."
                    class="textarea textarea-bordered w-full rounded-xl focus:textarea-primary transition-colors min-h-[100px] resize-none"
                    id="task-description-input" rows="3"></textarea>
            </div>

            <!-- Priority / Severity -->
            <div class="form-control">
                <label class="label pb-1">
                    <span class="label-text font-semibold text-sm">Severity</span>
                </label>
                <div class="flex gap-2">
                    <!-- Low -->
                    <button (click)="setPriority('low')" type="button"
                        class="flex-1 py-2.5 px-3 rounded-xl border text-sm font-semibold transition-all duration-200 cursor-pointer"
                        [ngClass]="priority === 'low'
                            ? 'ring-2 ring-info border-info bg-info/10 text-info'
                            : 'border-base-200 bg-base-200/50 text-base-content/60 hover:border-info/50'">
                        <div class="flex flex-col items-center gap-1">
                            <span class="w-2 h-2 rounded-full bg-info"></span>
                            Low
                        </div>
                    </button>
                    <!-- Medium -->
                    <button (click)="setPriority('medium')" type="button"
                        class="flex-1 py-2.5 px-3 rounded-xl border text-sm font-semibold transition-all duration-200 cursor-pointer"
                        [ngClass]="priority === 'medium'
                            ? 'ring-2 ring-warning border-warning bg-warning/10 text-warning'
                            : 'border-base-200 bg-base-200/50 text-base-content/60 hover:border-warning/50'">
                        <div class="flex flex-col items-center gap-1">
                            <span class="w-2 h-2 rounded-full bg-warning"></span>
                            Medium
                        </div>
                    </button>
                    <!-- High -->
                    <button (click)="setPriority('high')" type="button"
                        class="flex-1 py-2.5 px-3 rounded-xl border text-sm font-semibold transition-all duration-200 cursor-pointer"
                        [ngClass]="priority === 'high'
                            ? 'ring-2 ring-error border-error bg-error/10 text-error'
                            : 'border-base-200 bg-base-200/50 text-base-content/60 hover:border-error/50'">
                        <div class="flex flex-col items-center gap-1">
                            <span class="w-2 h-2 rounded-full bg-error"></span>
                            High
                        </div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="px-6 pb-6 pt-2 flex justify-end gap-3">
            <button (click)="onClose()"
                class="btn btn-ghost rounded-xl font-semibold">
                Cancel
            </button>
            <button (click)="onSave()" [disabled]="!title.trim()"
                class="btn btn-primary rounded-xl font-semibold shadow-sm gap-2"
                [class.btn-disabled]="!title.trim()">
                <i-lucide [name]="isEditMode ? 'pencil' : 'plus'" class="w-4 h-4"></i-lucide>
                {{ isEditMode ? 'Save Changes' : 'Create Task' }}
            </button>
        </div>
    </div>
</div>
}

<style>
    @keyframes dialogIn {
        from {
            opacity: 0;
            transform: scale(0.95) translateY(10px);
        }

        to {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
    }
</style>
