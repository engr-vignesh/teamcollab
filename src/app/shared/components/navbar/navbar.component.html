<div class="navbar bg-base-100 shadow-sm border-b border-base-200 px-4 md:px-6 sticky top-0 z-50">

    <!-- Left: brand + mobile menu -->
    <div class="navbar-start gap-1">
        <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost btn-circle lg:hidden">
                <i-lucide name="menu" class="w-5 h-5"></i-lucide>
            </div>
            <ul tabindex="0"
                class="menu menu-sm dropdown-content bg-base-100 rounded-box z-[1] mt-3 w-52 p-2 shadow border border-base-200">
                <li><a class="gap-2 font-medium" routerLink="/dashboard" routerLinkActive="active">
                        <i-lucide name="layout-dashboard" class="w-4 h-4"></i-lucide>
                        Dashboard
                    </a></li>
                <li><a class="gap-2 font-medium" routerLink="/status" routerLinkActive="active">
                        <i-lucide name="bar-chart-2" class="w-4 h-4"></i-lucide>
                        Status
                    </a></li>
            </ul>
        </div>

        <a class="flex items-center gap-2 cursor-pointer" routerLink="/dashboard">
            <div class="bg-primary text-primary-content p-2 rounded-xl">
                <i-lucide name="layout" class="w-5 h-5"></i-lucide>
            </div>
            <span class="text-xl font-bold tracking-tight hidden sm:block">
                Team<span class="text-primary">Collab</span>
            </span>
        </a>
    </div>

    <!-- Center: nav links (desktop only) -->
    <div class="navbar-center hidden lg:flex">
        <ul class="menu menu-horizontal px-1 gap-1">
            <li><a class="rounded-lg font-medium gap-2" routerLink="/dashboard" routerLinkActive="active">
                    <i-lucide name="layout-dashboard" class="w-4 h-4"></i-lucide>
                    Dashboard
                </a></li>
            <li><a class="rounded-lg font-medium gap-2" routerLink="/status" routerLinkActive="active">
                    <i-lucide name="bar-chart-2" class="w-4 h-4"></i-lucide>
                    Status
                </a></li>
        </ul>
    </div>

    <!-- Right: theme toggle + user menu -->
    <div class="navbar-end gap-2">
        <label class="swap swap-rotate btn btn-ghost btn-circle">
            <input type="checkbox" [checked]="isDark()" (change)="toggleTheme()" />
            <i-lucide name="sun" class="swap-off w-5 h-5"></i-lucide>
            <i-lucide name="moon" class="swap-on w-5 h-5"></i-lucide>
        </label>

        <!-- User Menu -->
        @if (auth.currentUser(); as user) {
        <div class="dropdown dropdown-end">
            <div tabindex="0" role="button"
                class="btn btn-ghost btn-circle avatar ring-2 ring-primary/20 ring-offset-base-100 ring-offset-2 hover:ring-primary/40 transition-all">
                <div class="w-9 rounded-full">
                    <img [src]="user.avatar" [alt]="user.name" />
                </div>
            </div>
            <div tabindex="0"
                class="dropdown-content bg-base-100 rounded-2xl z-[1] mt-3 w-64 shadow-xl border border-base-200 overflow-hidden">
                <!-- User info header -->
                <div class="px-4 py-4 bg-base-200/50 border-b border-base-200">
                    <div class="flex items-center gap-3">
                        <div class="avatar">
                            <div class="w-10 rounded-full">
                                <img [src]="user.avatar" [alt]="user.name" />
                            </div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="font-bold text-sm truncate">{{ user.name }}</p>
                            <p class="text-xs opacity-50 truncate">{{ user.email }}</p>
                        </div>
                    </div>
                </div>
                <!-- Menu items -->
                <ul class="menu p-2">
                    <li>
                        <a class="gap-3 rounded-lg">
                            <i-lucide name="settings" class="w-4 h-4 opacity-60"></i-lucide>
                            <span class="font-medium text-sm">Settings</span>
                        </a>
                    </li>
                    <li class="mt-1">
                        <button (click)="logout()"
                            class="gap-3 rounded-lg text-error hover:bg-error/10 hover:text-error">
                            <i-lucide name="log-out" class="w-4 h-4"></i-lucide>
                            <span class="font-medium text-sm">Sign out</span>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
        }
    </div>

</div>
