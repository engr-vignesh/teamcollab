<div class="min-h-screen flex items-center justify-center relative overflow-hidden"
     style="background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 40%, #312e81 70%, #0f172a 100%);">

    <!-- Animated background blobs -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-purple-500 rounded-full opacity-20 blur-3xl animate-blob">
        </div>
        <div
            class="absolute -bottom-40 -left-40 w-80 h-80 bg-blue-500 rounded-full opacity-20 blur-3xl animate-blob animation-delay-2s">
        </div>
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-indigo-500 rounded-full opacity-10 blur-3xl animate-blob animation-delay-4s">
        </div>
    </div>

    <!-- Grid pattern overlay -->
    <div class="absolute inset-0 opacity-[0.03]"
        style="background-image: radial-gradient(circle, rgba(255,255,255,0.8) 1px, transparent 1px); background-size: 40px 40px;">
    </div>

    <!-- Login Card -->
    <div class="relative z-10 w-full max-w-md mx-4 animate-float" style="animation-duration: 8s;">
        <div class="rounded-3xl border border-white/10 shadow-2xl p-8 md:p-10"
            style="background: rgba(255,255,255,0.05); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);">

            <!-- Brand -->
            <div class="flex flex-col items-center mb-10">
                <div class="p-4 rounded-2xl mb-5 shadow-lg"
                    style="background: linear-gradient(135deg, #6366f1, #8b5cf6); box-shadow: 0 8px 32px rgba(99,102,241,0.4);">
                    <i-lucide name="layout" class="w-8 h-8 text-white"></i-lucide>
                </div>
                <h1 class="text-3xl font-bold text-white tracking-tight">
                    Team<span class="text-indigo-400">Collab</span>
                </h1>
                <p class="text-white/50 mt-2 text-center text-sm">
                    Coordinate. Collaborate. Conquer.
                </p>
            </div>

            <!-- Divider -->
            <div class="flex items-center gap-3 mb-8">
                <div class="flex-1 h-px bg-white/10"></div>
                <span class="text-xs text-white/30 font-medium uppercase tracking-widest">Sign in to continue</span>
                <div class="flex-1 h-px bg-white/10"></div>
            </div>

            <!-- Real Google Sign-In button rendered by GIS -->
            <div class="flex justify-center" #googleBtnContainer></div>

            <!-- Fallback button (shown only when GIS hasn't loaded) -->
            @if (!gisReady()) {
            <button (click)="signInWithGoogle()" id="google-sign-in-btn"
                class="w-full flex items-center justify-center gap-3 bg-white text-gray-700 font-semibold py-3.5 px-6 rounded-xl hover:bg-gray-50 active:scale-[0.98] transition-all duration-200 shadow-lg hover:shadow-xl cursor-pointer group mt-3">
                <svg viewBox="0 0 24 24" width="20" height="20" class="flex-shrink-0">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                <span class="group-hover:translate-x-0.5 transition-transform">Sign in with Google</span>
            </button>
            }

            <!-- Footer -->
            <p class="text-white/25 text-xs text-center mt-8 leading-relaxed">
                By signing in, you agree to our
                <a href="#" class="text-indigo-400/60 hover:text-indigo-400 transition-colors">Terms of Service</a>
                and
                <a href="#" class="text-indigo-400/60 hover:text-indigo-400 transition-colors">Privacy Policy</a>
            </p>
        </div>

        <!-- Glow effect beneath card -->
        <div class="absolute -bottom-4 left-1/2 -translate-x-1/2 w-3/4 h-8 rounded-full blur-2xl opacity-20"
            style="background: linear-gradient(90deg, #6366f1, #8b5cf6);"></div>
    </div>
</div>
